<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>添加微信</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", sans-serif;
}
.wrap { text-align: center; padding: 40px 24px; }
.spinner {
  width: 44px; height: 44px;
  border: 3px solid #f0f0f0;
  border-top: 3px solid #1aad19;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading { font-size: 15px; color: #666; margin-bottom: 8px; }
.sub { font-size: 13px; color: #bbb; margin-bottom: 28px; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 32px;
  background: #1aad19; color: #fff;
  font-size: 15px; font-weight: 600;
  border-radius: 10px; border: none;
  cursor: pointer; text-decoration: none;
}
.btn:active { opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <div class="loading">正在跳转微信…</div>
  <div class="sub" id="sub">请稍候</div>
  <a class="btn" id="jumpBtn" href="weixin://dl/business/?t=p7neHUkMohg" style="display:none">
    点击跳转微信
  </a>
</div>

<script>
var url = 'weixin://dl/business/?t=p7neHUkMohg';

function jump() {
  var isAndroid = /Android/i.test(navigator.userAgent);
  if (isAndroid) {
    window.location.href = 'intent://dl/business/?t=p7neHUkMohg#Intent;scheme=weixin;package=com.tencent.mm;end';
    setTimeout(function() { window.location.href = url; }, 800);
  } else {
    window.location.href = url;
  }
  // 2秒后显示手动按钮
  setTimeout(function() {
    document.getElementById('sub').textContent = '若未自动跳转，请点击下方按钮';
    document.getElementById('jumpBtn').style.display = 'inline-flex';
  }, 2000);
}

setTimeout(jump, 500);
</script>
</body>
</html>
