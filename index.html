<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>测试</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #1aad19 0%, #0e7a0d 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    padding: 24px 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 340px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .wx-icon {
    width: 56px; height: 56px;
    background: #1aad19;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
  }
  .wx-icon svg { width: 34px; height: 34px; }
  .title { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.6; }

  /* 状态提示区 */
  .status-box {
    background: #f0faf0;
    border: 1px solid #b7e0b7;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #1aad19;
    font-weight: 500;
    line-height: 1.5;
  }
  .status-box.warn {
    background: #fff8e6;
    border-color: #ffd666;
    color: #d48806;
  }

  /* 二维码 */
  .qr-wrap {
    background: #f7f7f7;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 18px;
  }
  .qr-wrap img {
    width: 100%; max-width: 200px;
    display: block; margin: 0 auto;
    border-radius: 4px;
  }
  .qr-label {
    font-size: 12px; color: #aaa; margin-top: 10px;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .qr-label::before, .qr-label::after {
    content: ''; flex: 1; height: 1px; background: #e0e0e0;
  }

  .btn {
    display: block; width: 100%; padding: 14px;
    background: #1aad19; color: #fff;
    font-size: 16px; font-weight: 600;
    border: none; border-radius: 12px;
    cursor: pointer; text-decoration: none;
    letter-spacing: 1px;
    transition: opacity 0.15s;
    margin-bottom: 10px;
  }
  .btn:active { opacity: 0.82; }
  .btn.secondary {
    background: #f5f5f5; color: #555; font-weight: 500;
    font-size: 14px; padding: 12px;
  }
  .hint { font-size: 11px; color: #ccc; margin-top: 12px; line-height: 1.7; }

  /* 倒计时圆圈 */
  .countdown {
    display: inline-block;
    width: 22px; height: 22px;
    background: #1aad19;
    color: #fff;
    border-radius: 50%;
    font-size: 12px; font-weight: 700;
    line-height: 22px;
    text-align: center;
    margin-right: 4px;
    vertical-align: middle;
  }
</style>
</head>

<script>
// 1. 页面加载后立即尝试跳转微信
(function autoJump() {
  var count = 3;
  var cdEl = document.getElementById('cdNum');
  var statusEl = document.getElementById('statusBox');

  var timer = setInterval(function() {
    count--;
    if (count > 0) {
      cdEl.textContent = count;
    } else {
      clearInterval(timer);
      // 尝试唤起微信
      var iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = 'weixin://';
      document.body.appendChild(iframe);
      setTimeout(function() { document.body.removeChild(iframe); }, 500);

      // 同时直接跳
      window.location.href = 'weixin://';

      // 更新状态提示
      setTimeout(function() {
        statusEl.className = 'status-box warn';
        statusEl.innerHTML = '⚠️ 若未自动跳转，请点击下方按钮或长按二维码';
      }, 2000);
    }
  }, 1000);
})();

// 2. 保存二维码（移动端）
function saveQR() {
  var img = document.getElementById('qrImg');
  var a = document.createElement('a');
  a.href = img.src;
  a.download = 'weixin_qr.png';
  a.click();
  // 提示
  setTimeout(function() {
    alert('二维码已保存，请打开微信→扫一扫→从相册选取，识别添加好友');
  }, 300);
  return false;
}

// 3. 手动跳转按钮
document.getElementById('jumpBtn').addEventListener('click', function(e) {
  e.preventDefault();
  window.location.href = 'weixin://';
  setTimeout(function() {
    document.getElementById('statusBox').className = 'status-box warn';
    document.getElementById('statusBox').innerHTML = '⚠️ 若未跳转成功，请长按上方二维码识别添加';
  }, 1500);
});
</script>
